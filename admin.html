<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin Rey Eterno</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
}

button{
width:100%;
padding:15px;
background:#4a2c7a;
color:white;
border:0;
border-radius:10px;
cursor:pointer;
}

input{
width:100%;
margin:10px 0;
}

</style>

</head>

<body>


<div class="container">

<h2>
📷 Galería Rey Eterno
</h2>


<input 
type="file"
id="imagenes"
multiple
accept="image/*">


<button onclick="subir()">
Subir imágenes
</button>


<p id="estado"></p>


</div>


<script>


const usuario="TU_USUARIO_GITHUB";

const repo="TU_REPOSITORIO";

const token="TU_TOKEN";


async function subir(){


const archivos=
document.getElementById("imagenes").files;


if(!archivos.length){
alert("Selecciona imágenes");
return;
}



for(let archivo of archivos){


let base64=
await convertirBase64(archivo);


let ruta=
"galeria/"+archivo.name;



let url=
`https://api.github.com/repos/${usuario}/${repo}/contents/${ruta}`;



await fetch(url,{

method:"PUT",

headers:{

"Authorization":
"Bearer "+token,

"Content-Type":
"application/json"

},


body:JSON.stringify({

message:
"Subir imagen galeria",

content:
base64.split(",")[1]

})

});


}



document.getElementById("estado").innerHTML=
"✅ Imágenes subidas";


}




function convertirBase64(file){


return new Promise(resolve=>{


let reader=new FileReader();


reader.onload=()=>{
resolve(reader.result);
};


reader.readAsDataURL(file);


});


}



</script>


</body>
</html>
