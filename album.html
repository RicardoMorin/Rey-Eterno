<script>
    // =============================
// COMPARTIR FOTOS
// =============================


document.querySelectorAll(".share-photo")
.forEach(btn=>{


btn.addEventListener("click",async()=>{


const image = btn.dataset.image;


const url = window.location.origin + "/" + image;



if(navigator.share){


await navigator.share({

title:"Campamento Siempre por Amor",

text:"Un momento especial del campamento ❤️",

url:url

});


}else{


navigator.clipboard.writeText(url);


alert("Enlace de /campamento/imagen copiado");


}



});


});
</script>

<script>


//======================
// GALERÍA PAGINAS
//======================


const pages=document.querySelectorAll(".gallery-page");

const prevBtn=document.querySelector(".prev");

const nextBtn=document.querySelector(".next");


let currentPage=0;



function showPage(index){

pages.forEach(page=>{

page.classList.remove("active");

});


pages[index].classList.add("active");


}



showPage(currentPage);



nextBtn.onclick=()=>{


currentPage++;


if(currentPage>=pages.length){

currentPage=0;

}


showPage(currentPage);


};




prevBtn.onclick=()=>{


currentPage--;


if(currentPage<0){

currentPage=pages.length-1;

}


showPage(currentPage);


};






//======================
// LIGHTBOX
//======================


const items=document.querySelectorAll(".gallery-item");

const lightbox=document.getElementById("lightbox");

const img=document.getElementById("lightboxImage");

const video=document.getElementById("lightboxVideo");


let current=0;



function openItem(index){


current=index;


let item=items[index];


let image=item.querySelector("img");

let vid=item.querySelector("video");



lightbox.classList.add("active");



if(image){


img.style.display="block";

video.style.display="none";


img.src=image.src;


}



if(vid){


img.style.display="none";

video.style.display="block";


video.src=vid.querySelector("source").src;


video.play();


}



}




items.forEach((item,index)=>{


item.onclick=()=>openItem(index);


});




document.querySelector(".close-lightbox").onclick=()=>{


lightbox.classList.remove("active");


video.pause();


};




document.querySelector(".lightbox-next").onclick=()=>{


current++;


if(current>=items.length){

current=0;

}


openItem(current);


};





document.querySelector(".lightbox-prev").onclick=()=>{


current--;


if(current<0){

current=items.length-1;

}


openItem(current);


};




</script>
